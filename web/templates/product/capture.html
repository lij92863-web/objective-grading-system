<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><title>{{title}}</title><link rel="stylesheet" href="/static/product.css"></head><body><header><a href="/sessions/{{session_id}}">返回考试</a><strong>{{title}}</strong></header><main><section><h2>手动上传</h2><form method="post" enctype="multipart/form-data" action="/sessions/{{session_id}}/capture/upload"><input type="file" name="image" accept="image/jpeg,image/png" required><button>加入队列</button></form></section><section><h2>监听文件夹</h2><form method="post" action="/sessions/{{session_id}}/capture/watch-folder"><input name="folder" required placeholder="本机文件夹绝对路径"><button>扫描新图片</button></form></section><section><h2>浏览器摄像头</h2><p class="warning">只有系统/浏览器能识别到的摄像头才可使用。普通 USB 数据线连接手机时，通常不能直接调用手机摄像头。</p><video id="camera-video" autoplay playsinline></video><p id="camera-status">尚未连接</p><button onclick="startProductCamera()">检查摄像头</button> <button onclick="captureProductPhoto('{{session_id}}')">拍照并上传</button></section><section><h2>采集队列</h2><ul>{{jobs}}</ul></section><script src="/static/product_camera.js"></script></main></body></html>
