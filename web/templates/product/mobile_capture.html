<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#101820">
  <title>{{title}}</title>
  <link rel="stylesheet" href="/static/mobile_capture.css">
</head>
<body class="capture-app" data-session-id="{{session_id}}">
  <header class="capture-topbar">
    <a href="/mobile-capture" aria-label="返回考试列表">‹</a>
    <div><strong>{{exam_name}}</strong><small>{{class_name}} · {{session_state}}</small></div>
    <span id="service-state" class="connection-pill is-offline">服务检查中</span>
  </header>

  <main>
    <section class="camera-stage" id="camera-stage">
      <video id="mobile-video" autoplay playsinline muted></video>
      <div class="a4-guide" aria-hidden="true"><span>答题卡放入框内</span></div>
      <div id="capture-flash" class="capture-flash" aria-hidden="true"></div>
      <div class="camera-message" id="camera-message">点击“启动摄像头”并允许权限</div>
      <img id="last-thumbnail" class="last-thumbnail" alt="最近一张照片" hidden>
    </section>

    <section class="camera-controls" aria-label="拍摄控制">
      <label class="camera-select">摄像头<select id="camera-select" disabled><option>等待权限</option></select></label>
      <div class="button-row">
        <button id="start-camera" type="button" class="secondary-action">启动摄像头</button>
        <button id="capture-button" type="button" class="shutter" disabled aria-label="拍照"><span></span></button>
        <button id="stop-camera" type="button" class="secondary-action" disabled>停止</button>
      </div>
      <p id="capture-message" class="capture-message">照片会先保存在手机本地，再由单上传队列发送。</p>
    </section>

    <section class="status-panel">
      <h2>采集状态</h2>
      <div class="status-grid">
        <div><span id="count-captured">0</span><small>已拍摄</small></div>
        <div><span id="count-pending">0</span><small>待上传</small></div>
        <div><span id="count-uploading">0</span><small>上传中</small></div>
        <div><span id="count-acknowledged">0</span><small>已入队</small></div>
        <div><span id="count-review">0</span><small>待复核</small></div>
        <div><span id="count-failed">0</span><small>失败</small></div>
      </div>
      <div class="server-detail">
        <span>服务端：排队 <b id="server-queued">0</b></span>
        <span>处理中 <b id="server-processing">0</b></span>
        <span>手机任务 <b id="server-mobile-total">0</b></span>
      </div>
      <button id="retry-button" type="button" class="retry-action">立即重试失败项目</button>
      <ol id="recent-jobs" class="recent-jobs"><li>还没有服务器任务</li></ol>
    </section>
  </main>

  <script src="/static/mobile_capture.js" defer></script>
</body>
</html>
