<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><title>{{title}}</title><link rel="stylesheet" href="/static/product.css"></head><body><header><a href="/sessions">考试列表</a><strong>{{title}}</strong></header><main><p>当前状态：{{state}}</p><section><h2>考试材料</h2><ul>{{assets}}</ul><form method="post" enctype="multipart/form-data" action="/sessions/{{session_id}}/assets"><select name="asset_type"><option value="ANSWER_KEY">标准答案 CSV</option><option value="PAPER">试卷</option><option value="TEMPLATE">已确认模板</option><option value="ANSWER_SHEET_SAMPLE">答题卡样张</option></select><input type="file" name="asset" required><button>上传材料</button></form></section><a class="button" href="/sessions/{{session_id}}/capture">进入采集</a> <a class="button" href="/sessions/{{session_id}}/review">复核中心</a> <a class="button" href="/sessions/{{session_id}}/finalize">最终发布</a></main></body></html>
